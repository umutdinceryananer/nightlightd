name: Release

# Every v* tag becomes a GitHub release with the .deb attached. The release
# body is the annotated tag's message, so the notes are written where the
# version is minted — `git tag -a` — and nowhere else.
on:
  push:
    tags:
      - "v*"

# The one permission release creation needs.
permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Same cache as CI, so the release build reuses compiled dependencies.
      - uses: Swatinem/rust-cache@v2

      - name: Build (release)
        run: cargo build --release --workspace

      # Compiled fresh on each tag; tags are rare enough that the few minutes
      # beat carrying a third-party installer action.
      - name: Install cargo-deb
        run: cargo install cargo-deb --locked

      - name: Package .deb
        run: cargo deb -p nightlightd --no-build

      # checkout fetches the tag lightweight; force-fetch the real annotated
      # object so its message — the release notes — is readable.
      - name: Extract the tag message as release notes
        run: |
          git fetch --force origin "+refs/tags/${GITHUB_REF_NAME}:refs/tags/${GITHUB_REF_NAME}"
          git tag -l --format='%(contents)' "${GITHUB_REF_NAME}" > /tmp/notes.md

      - name: Create the release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --verify-tag \
            --title "${GITHUB_REF_NAME}" \
            --notes-file /tmp/notes.md \
            target/debian/*.deb
